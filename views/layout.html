<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Adam Mwaniki — Software Engineer. I build software that's clear, maintainable and built to last.">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&family=Great+Vibes&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body{{if .IsDark}} class="dark"{{end}}
      hx-on:htmx:before-request="closeMobileNav()"
      hx-on:htmx:after-settle="window.scrollTo({top:0,behavior:'instant'}); updateDarkMode();"
      hx-on:htmx:history-restore="closeMobileNav(); updateDarkMode();"
      hx-on:htmx:after-request="var t=event.detail.xhr.getResponseHeader('HX-Title'); if(t) document.title=t"
      hx-on:keydown="if(event.key==='Escape') closeMobileNav()">

  <div id="page-wrapper">
    {{template "page-content" .}}
  </div>

  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script>
  function toggleMobileNav() {
    var mn = document.querySelector('.mobile-nav');
    var hb = document.querySelector('.hamburger');
    if (!mn || !hb) return;
    mn.classList.toggle('open');
    hb.classList.toggle('is-open');
    document.body.style.overflow = mn.classList.contains('open') ? 'hidden' : '';
  }
  function closeMobileNav() {
    var mn = document.querySelector('.mobile-nav');
    var hb = document.querySelector('.hamburger');
    if (mn) mn.classList.remove('open');
    if (hb) hb.classList.remove('is-open');
    document.body.style.overflow = '';
  }
  function updateDarkMode() {
    var el = document.querySelector('[data-dark]');
    if (el) document.body.classList.toggle('dark', el.dataset.dark === 'true');
  }
  </script>

</body>
</html>
