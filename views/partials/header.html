{{define "header.html"}}
<nav data-dark="{{if .IsDark}}true{{else}}false{{end}}">
  <div class="nav-inner">
    <a class="nav-logo" href="/" hx-get="/" hx-target="#page-wrapper" hx-push-url="true">Adam Mwaniki</a>
    <ul class="nav-links">
      {{range .Sections}}
      <li><a href="/{{.ID}}"
             hx-get="/{{.ID}}"
             hx-target="#page-wrapper"
             hx-push-url="true"
             {{if eq $.Page .ID}}class="active"{{end}}>{{.NavTitle}}</a></li>
      {{end}}
    </ul>
    <button class="hamburger" aria-label="Menu" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
  </div>
</nav>
{{end}}
