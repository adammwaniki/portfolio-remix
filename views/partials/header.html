{{define "header.html"}}
<nav data-dark="{{if .IsDark}}true{{else}}false{{end}}" aria-label="Main navigation">
  <div class="nav-inner">
    <a class="nav-logo" href="/" hx-get="/" hx-target="#page-wrapper" hx-push-url="true">Adam Mwaniki</a>
    <ul class="nav-links">
      {{range .Sections}}
      <li><a href="/{{.ID}}"
             hx-get="/{{.ID}}"
             hx-target="#page-wrapper"
             hx-push-url="true"
             {{if eq $.Page .ID}}class="active"{{end}}>{{.NavTitle}}</a></li>
      {{end}}
    </ul>
    <div class="nav-actions">
      <button class="nav-search-btn" onclick="openSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="dark-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="hamburger" aria-label="Menu" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
{{end}}
