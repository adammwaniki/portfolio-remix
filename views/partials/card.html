{{define "card.html"}}
<a class="card{{if .IsDark}} card--dark{{end}}{{if .IsAlt}} card--alt{{end}}"
   href="/{{.SectionID}}/{{.Card.ID}}"
   hx-get="/{{.SectionID}}/{{.Card.ID}}"
   hx-target="#page-wrapper"
   hx-push-url="true">
  <svg class="arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
  <span class="card-icon">{{.Card.CardIcon}}</span>
  <div class="card-tags">{{.Card.Subtitle}}</div>
  <h3 class="card-title">{{.Card.Title}}</h3>
  <p class="card-desc">{{.Card.Description}}</p>
</a>
{{end}}
